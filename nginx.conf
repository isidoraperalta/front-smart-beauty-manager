server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router usa rutas del lado del cliente (ej: /clientes).
    # Sin esto, nginx devolvería 404 al acceder directamente a una ruta.
    # try_files intenta servir el archivo real primero; si no existe, sirve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
